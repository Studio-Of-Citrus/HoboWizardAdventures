name: PR Shared Integrity

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'ProjectSettings/**'
      - 'Packages/manifest.json'
      - 'Packages/packages-lock.json'
      - '.github/workflows/pr-shared-integrity.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  shared-integrity:
    name: Shared Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Force Text Serialization
        run: |
          grep -q "m_SerializationMode: 2" ProjectSettings/EditorSettings.asset || \
            { echo "::error::Asset Serialization Mode must be Force Text"; exit 1; }

      - name: Verify Package Manifest Valid JSON
        run: |
          python3 -c "import json; json.load(open('Packages/manifest.json'))" || \
            { echo "::error::Packages/manifest.json is not valid JSON"; exit 1; }
          python3 -c "import json; json.load(open('Packages/packages-lock.json'))" || \
            { echo "::error::Packages/packages-lock.json is not valid JSON"; exit 1; }
          echo "Package manifests are valid JSON"

      - name: Check Lock File in Sync
        run: |
          echo "Checking all manifest dependencies appear in lock file..."
          MISSING=0
          for pkg in $(python3 -c "
          import json
          m = json.load(open('Packages/manifest.json'))
          for k in m.get('dependencies', {}):
              print(k)
          "); do
            if ! python3 -c "
          import json, sys
          lock = json.load(open('Packages/packages-lock.json'))
          deps = lock.get('dependencies', {})
          sys.exit(0 if '$pkg' in deps else 1)
          "; then
              echo "::error::Package $pkg is in manifest.json but missing from packages-lock.json"
              MISSING=1
            fi
          done
          [ "$MISSING" -eq 0 ] || exit 1
          echo "Lock file is in sync with manifest"

      - name: Validate ProjectSettings YAML
        run: |
          echo "Checking ProjectSettings files have valid YAML headers..."
          ERRORS=0
          for file in ProjectSettings/*.asset; do
            if ! head -1 "$file" | grep -q "^%YAML"; then
              echo "::error file=$file::Missing %YAML header — file may be corrupted or binary"
              ERRORS=1
            fi
          done
          [ "$ERRORS" -eq 0 ] || exit 1
          echo "All ProjectSettings files valid"

      - name: Check for Merge Conflicts
        run: |
          if grep -rn "<<<<<<< " ProjectSettings/ Packages/; then
            echo "::error::Unresolved merge conflicts in shared files"
            exit 1
          fi
