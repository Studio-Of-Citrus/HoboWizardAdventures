name: PR Backend Integrity

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Assets/Scripts/**'
      - 'ProjectSettings/**'
      - 'Packages/manifest.json'
      - 'Packages/packages-lock.json'
      - '.github/workflows/pr-backend-integrity.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-integrity:
    name: Backend Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Meta File Check
        uses: DeNA/unity-meta-check@v3
        with:
          enable_pr_comment: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Force Text Serialization
        run: |
          grep -q "m_SerializationMode: 2" ProjectSettings/EditorSettings.asset || \
            { echo "::error::Asset Serialization Mode must be Force Text"; exit 1; }

      - name: Check for Merge Conflicts
        run: |
          if grep -rn "<<<<<<< " --include="*.cs" --include="*.asset" --include="*.meta" Assets/ ProjectSettings/; then
            echo "::error::Unresolved merge conflicts detected"
            exit 1
          fi

      - name: Validate C# Syntax
        run: |
          echo "Checking for common C# issues..."
          ERRORS=0
          while IFS= read -r -d '' file; do
            if grep -Pn '^\s*<<<|^\s*>>>|^\s*===' "$file"; then
              echo "::error file=$file::Conflict marker found"
              ERRORS=1
            fi
          done < <(find Assets -name "*.cs" -print0)
          [ "$ERRORS" -eq 0 ] || exit 1
          echo "All scripts OK"
