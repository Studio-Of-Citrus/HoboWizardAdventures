name: PR Backend Integrity

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Assets/Scripts/**'
      - 'Assets/Prefabs/**'
      - 'Assets/Scenes/**'
      - 'ProjectSettings/**'
      - 'Packages/manifest.json'
      - 'Packages/packages-lock.json'
      - '.github/workflows/pr-backend-integrity.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrity-checks:
    name: File Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Meta File Check
        uses: DeNA/unity-meta-check@v3
        with:
          enable_pr_comment: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Project Settings
        run: |
          echo "Checking Asset Serialization Mode (Force Text)..."
          grep -q "m_SerializationMode: 2" ProjectSettings/EditorSettings.asset || \
            { echo "::error::Asset Serialization Mode must be Force Text (m_SerializationMode: 2)"; exit 1; }

          echo "Checking for merge conflict markers..."
          if grep -rn "<<<<<<< " --include="*.unity" --include="*.prefab" --include="*.asset" --include="*.cs" --include="*.meta" Assets/ ProjectSettings/; then
            echo "::error::Unresolved merge conflicts detected"
            exit 1
          fi

          echo "All project settings OK"
