name: PR Frontend Integrity

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Assets/Scenes/**'
      - 'Assets/Prefabs/**'
      - 'Assets/Art/**'
      - 'Assets/Animations/**'
      - 'Assets/SFX/**'
      - 'Assets/Settings/**'
      - 'Packages/manifest.json'
      - 'Packages/packages-lock.json'
      - '.github/workflows/pr-frontend-integrity.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-integrity:
    name: Frontend Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Meta File Check
        uses: DeNA/unity-meta-check@v3
        with:
          enable_pr_comment: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Build Scenes Exist
        run: |
          echo "Checking scenes in Build Settings..."
          grep -oP "path: \K.*" ProjectSettings/EditorBuildSettings.asset | while read -r scene; do
            if [ ! -f "$scene" ]; then
              echo "::error::Scene in Build Settings not found: $scene"
              exit 1
            fi
          done
          echo "All build scenes present"

      - name: Check for Merge Conflicts in Assets
        run: |
          if grep -rn "<<<<<<< " --include="*.unity" --include="*.prefab" --include="*.asset" --include="*.meta" Assets/; then
            echo "::error::Unresolved merge conflicts detected in assets"
            exit 1
          fi

      - name: Validate YAML Asset Integrity
        run: |
          echo "Checking YAML headers on scene and prefab files..."
          ERRORS=0
          for ext in unity prefab; do
            while IFS= read -r -d '' file; do
              if ! head -1 "$file" | grep -q "^%YAML"; then
                echo "::error file=$file::Not a valid YAML-serialized Unity file (missing %YAML header)"
                ERRORS=1
              fi
            done < <(find Assets -name "*.$ext" -print0)
          done
          [ "$ERRORS" -eq 0 ] || exit 1
          echo "All assets valid"
